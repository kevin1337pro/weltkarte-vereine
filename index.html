<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Ruhrgebiet Regionalkarte</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #edf3cd;
        --paper-deep: #cad5b7;
        --ink: #171a10;
        --muted: #596044;
        --district: #d7e797;
        --district-hot: #c5e54c;
        --city: #9ec63b;
        --city-hot: #b6df16;
        --edge: #fdfef6;
        --depth: #9da29b;
        --river: #177db5;
        --river-dark: #0d638f;
        --rule: rgba(37, 45, 28, 0.16);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #c8d1b2;
      }

      body {
        display: grid;
        place-items: center;
        color: var(--ink);
      }

      button {
        font: inherit;
      }

      .phone {
        position: relative;
        width: min(100vw, 430px);
        height: 100svh;
        min-height: 690px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.82), transparent 38%),
          linear-gradient(180deg, #f7f8e9 0%, #dfe8c0 44%, #9aa58e 100%);
        isolation: isolate;
      }

      .phone::before {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.13) 1px, transparent 1px);
        background-size: 34px 34px;
        opacity: 0.45;
        mask-image: linear-gradient(180deg, transparent, #000 8%, #000 92%, transparent);
      }

      .map-header {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        right: 18px;
        left: 18px;
        z-index: 8;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        pointer-events: none;
      }

      .headline {
        max-width: 260px;
        transform-origin: left top;
        transition:
          opacity 360ms ease,
          transform 360ms ease;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: #55720f;
        font-size: 0.72rem;
        font-weight: 950;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #10130b;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 3.05rem;
        font-style: italic;
        font-weight: 950;
        line-height: 0.85;
      }

      .step-pill {
        display: grid;
        min-width: 72px;
        min-height: 38px;
        padding: 0 11px;
        place-items: center;
        border: 1px solid rgba(26, 34, 18, 0.14);
        border-radius: 999px;
        background: rgba(253, 254, 246, 0.78);
        box-shadow: 0 12px 34px rgba(26, 34, 18, 0.1);
        color: #445022;
        font-size: 0.76rem;
        font-weight: 950;
        pointer-events: auto;
        backdrop-filter: blur(12px);
        transition:
          opacity 360ms ease,
          transform 360ms ease;
      }

      .phone.is-layer-open .headline {
        opacity: 0.24;
        transform: translateY(-8px) scale(0.9);
      }

      .phone.is-layer-open .step-pill {
        opacity: 0.72;
        transform: translateY(-5px);
      }

      .map-stage {
        position: absolute;
        inset: 0;
        z-index: 1;
        overflow: hidden;
        touch-action: pan-y;
      }

      .map-stage::after {
        position: absolute;
        inset: 0 0 auto;
        height: 190px;
        pointer-events: none;
        content: "";
        background: linear-gradient(180deg, rgba(247, 248, 233, 0.94), rgba(247, 248, 233, 0.62) 48%, rgba(247, 248, 233, 0));
      }

      .map-world {
        --map-x: -520px;
        --map-y: -240px;
        --map-scale: 1.4;
        position: absolute;
        top: 0;
        left: 0;
        width: 1600px;
        height: 980px;
        transform:
          translate3d(var(--map-x), var(--map-y), 0)
          scale(var(--map-scale));
        transform-origin: 0 0;
        transition: transform 820ms cubic-bezier(0.18, 0.92, 0.2, 1);
        will-change: transform;
      }

      .region-shadow {
        fill: rgba(33, 39, 29, 0.22);
        filter: blur(16px);
        transform: translate(16px, 26px);
      }

      .region-depth {
        fill: var(--depth);
        stroke: #777d78;
        stroke-linejoin: round;
        stroke-width: 2;
        transform: translate(11px, 16px);
      }

      .region-top {
        fill: var(--district);
        stroke: var(--edge);
        stroke-linejoin: round;
        stroke-width: 4.2;
        filter: url(#topLight);
        transition:
          fill 220ms ease,
          stroke-width 220ms ease;
      }

      .region-top.city {
        fill: var(--city);
      }

      .region-top.hot {
        fill: var(--district-hot);
      }

      .region-top.city.hot {
        fill: var(--city-hot);
      }

      .region-top.is-active {
        stroke-width: 7;
      }

      .river {
        fill: none;
        stroke: var(--river);
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 9;
        filter: drop-shadow(0 3px 0 rgba(255, 255, 255, 0.68)) drop-shadow(0 6px 5px rgba(0, 45, 72, 0.24));
      }

      .river.thin {
        stroke-width: 4.5;
      }

      .river-label {
        fill: #1672a8;
        font-size: 24px;
        font-weight: 850;
        letter-spacing: 0;
      }

      .area-label {
        fill: rgba(36, 45, 28, 0.34);
        font-size: 48px;
        font-weight: 300;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .city-label {
        fill: #10130b;
        font-size: 24px;
        font-weight: 950;
        paint-order: stroke;
        stroke: rgba(253, 254, 246, 0.88);
        stroke-width: 5;
        text-anchor: middle;
      }

      .mini-map {
        opacity: 0.92;
      }

      .mini-map path {
        fill: #cfdf8c;
        stroke: rgba(255, 255, 255, 0.84);
        stroke-width: 3;
      }

      .mini-map .mini-hot {
        fill: #e72d23;
      }

      .map-marker {
        cursor: pointer;
        outline: none;
        transform-box: fill-box;
        transform-origin: center;
      }

      .map-marker .tap-ring {
        fill: rgba(253, 254, 246, 0.78);
        stroke: rgba(37, 45, 28, 0.24);
        stroke-width: 2.6;
        transition:
          fill 220ms ease,
          stroke 220ms ease,
          stroke-width 220ms ease;
      }

      .map-marker .halo {
        fill: rgba(244, 255, 167, 0.28);
        stroke: rgba(255, 255, 255, 0.7);
        stroke-width: 2;
        opacity: 0.82;
      }

      .map-marker .marker-icon {
        fill: #10130b;
        transition: transform 260ms ease;
      }

      .map-marker text {
        fill: #11140c;
        font-size: 16px;
        font-weight: 950;
        paint-order: stroke;
        stroke: rgba(253, 254, 246, 0.92);
        stroke-width: 4.8px;
        text-anchor: middle;
      }

      .map-marker .marker-meta {
        fill: rgba(37, 45, 28, 0.72);
        font-size: 10px;
        font-weight: 950;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .map-marker[aria-current="true"] .tap-ring {
        fill: #fffdec;
        stroke: rgba(37, 45, 28, 0.56);
        stroke-width: 3.2;
      }

      .map-marker[aria-current="true"] .marker-icon {
        transform: scale(1.08);
      }

      .map-marker[aria-current="true"] .halo {
        animation: pulse 1.7s ease-out infinite;
      }

      .map-marker:focus-visible .tap-ring {
        stroke: #111;
        stroke-width: 4.5;
      }

      @keyframes pulse {
        0% {
          opacity: 0.8;
          transform: scale(0.9);
        }

        100% {
          opacity: 0;
          transform: scale(1.24);
        }
      }

      .route-line {
        fill: none;
        stroke: rgba(23, 125, 181, 0.45);
        stroke-dasharray: 10 13;
        stroke-linecap: round;
        stroke-width: 3;
      }

      .active-route {
        fill: none;
        stroke: rgba(16, 19, 11, 0.76);
        stroke-linecap: round;
        stroke-width: 4.5;
        filter: drop-shadow(0 5px 8px rgba(37, 45, 28, 0.24));
      }

      .route-dot {
        fill: #10130b;
        opacity: 0;
      }

      .floating-icon {
        position: absolute;
        z-index: 11;
        display: grid;
        width: var(--float-size, 70px);
        height: var(--float-size, 70px);
        place-items: center;
        border: 1px solid rgba(37, 45, 28, 0.17);
        border-radius: 22px;
        background:
          radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.95), transparent 42%),
          #fffdec;
        box-shadow: 0 18px 58px rgba(37, 45, 28, 0.28);
        color: #10130b;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.92);
      }

      .floating-icon svg {
        width: calc(var(--float-size, 70px) * 0.63);
        height: calc(var(--float-size, 70px) * 0.63);
        fill: currentColor;
      }

      .floating-icon.is-visible {
        opacity: 1;
      }

      .city-strip {
        position: absolute;
        right: 0;
        bottom: max(18px, env(safe-area-inset-bottom));
        left: 0;
        z-index: 7;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 0 18px 2px;
        scrollbar-width: none;
        scroll-snap-type: x mandatory;
      }

      .city-strip::-webkit-scrollbar {
        display: none;
      }

      .city-button {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        align-items: center;
        min-width: 162px;
        min-height: 58px;
        padding: 9px 12px 9px 10px;
        border: 1px solid rgba(37, 45, 28, 0.13);
        border-radius: 8px;
        background: rgba(253, 254, 246, 0.9);
        box-shadow: 0 12px 36px rgba(37, 45, 28, 0.12);
        color: var(--ink);
        cursor: pointer;
        scroll-snap-align: center;
        backdrop-filter: blur(13px);
      }

      .city-button svg {
        width: var(--button-icon, 25px);
        height: var(--button-icon, 25px);
        fill: currentColor;
      }

      .city-button span {
        min-width: 0;
        overflow: hidden;
        font-size: 0.83rem;
        font-weight: 950;
        line-height: 1.05;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .city-button small {
        display: block;
        margin-top: 2px;
        overflow: hidden;
        color: var(--muted);
        font-size: 0.66rem;
        font-weight: 780;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .city-button.is-active {
        border-color: rgba(37, 45, 28, 0.34);
        background: #12150c;
        color: #fffdec;
      }

      .city-button.is-active small {
        color: rgba(255, 253, 236, 0.72);
      }

      .map-legend {
        position: absolute;
        right: 18px;
        bottom: calc(max(18px, env(safe-area-inset-bottom)) + 74px);
        z-index: 6;
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 8px 10px;
        border: 1px solid rgba(37, 45, 28, 0.12);
        border-radius: 8px;
        background: rgba(253, 254, 246, 0.75);
        color: rgba(37, 45, 28, 0.72);
        font-size: 0.68rem;
        font-weight: 950;
        backdrop-filter: blur(10px);
      }

      .map-legend span {
        width: 26px;
        height: 3px;
        border-radius: 99px;
        background: var(--river);
      }

      .soft-cover {
        position: absolute;
        inset: 0;
        z-index: 9;
        background: rgba(31, 39, 24, 0.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity 420ms ease;
      }

      .soft-cover.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .info-layer {
        position: absolute;
        inset: auto 0 0;
        z-index: 10;
        min-height: min(58svh, 462px);
        padding: 26px 20px max(28px, env(safe-area-inset-bottom));
        border-radius: 28px 28px 0 0;
        background:
          radial-gradient(circle at 16% 8%, rgba(197, 229, 76, 0.2), transparent 34%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0) 46%),
          #fffdec;
        box-shadow: 0 -24px 86px rgba(37, 45, 28, 0.34);
        transform: translateY(105%);
        transition: transform 640ms cubic-bezier(0.18, 0.92, 0.2, 1);
        will-change: transform;
      }

      .info-layer.is-open {
        transform: translateY(0);
      }

      .info-layer::before {
        position: absolute;
        top: 10px;
        left: 50%;
        width: 46px;
        height: 4px;
        border-radius: 999px;
        background: rgba(37, 45, 28, 0.22);
        content: "";
        transform: translateX(-50%);
      }

      .info-top {
        display: grid;
        grid-template-columns: 74px minmax(0, 1fr) 38px;
        gap: 14px;
        align-items: start;
      }

      .info-icon-spacer {
        width: 74px;
        height: 74px;
      }

      .info-kicker {
        margin: 6px 0 5px;
        color: #55720f;
        font-size: 0.72rem;
        font-weight: 950;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .info-title {
        margin: 0;
        overflow-wrap: anywhere;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 2.12rem;
        font-style: italic;
        font-weight: 950;
        line-height: 0.92;
      }

      .info-title.is-long {
        font-size: 1.82rem;
        line-height: 0.98;
      }

      .close-button {
        display: grid;
        width: 38px;
        height: 38px;
        padding: 0;
        place-items: center;
        border: 1px solid rgba(37, 45, 28, 0.14);
        border-radius: 50%;
        background: #edf3cd;
        color: var(--ink);
        cursor: pointer;
      }

      .close-button svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-width: 2.4;
      }

      .info-body {
        margin: 22px 0 0;
      }

      .info-body p {
        margin: 0;
        color: #3f4732;
        font-size: 1rem;
        font-weight: 760;
        line-height: 1.52;
      }

      .info-facts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 21px 0 0;
      }

      .fact {
        min-height: 82px;
        padding: 12px;
        border: 1px solid rgba(37, 45, 28, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.46);
      }

      .fact strong {
        display: block;
        margin-bottom: 6px;
        font-size: 0.72rem;
        font-weight: 950;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }

      .fact span {
        color: #4d563c;
        font-size: 0.87rem;
        font-weight: 820;
        line-height: 1.28;
      }

      .detail-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        margin-top: 22px;
        padding: 0 14px;
        border: 0;
        border-radius: 8px;
        background: #12150c;
        color: #fffdec;
        cursor: pointer;
        font-weight: 950;
        text-decoration: none;
        appearance: none;
      }

      .detail-link svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.5;
      }

      @media (min-width: 431px) {
        .phone {
          height: min(100svh, 860px);
          box-shadow: 0 24px 80px rgba(37, 45, 28, 0.28);
        }
      }

      @media (min-width: 760px) {
        body {
          padding: 0;
        }

        .phone {
          width: 100vw;
          max-width: 1440px;
          height: 100svh;
          min-height: 760px;
          box-shadow: none;
        }

        .map-header {
          top: 32px;
          right: 34px;
          left: 34px;
          align-items: flex-start;
        }

        .headline {
          max-width: 620px;
        }

        .eyebrow {
          font-size: 0.78rem;
        }

        h1 {
          font-size: 4.65rem;
        }

        .phone.is-layer-open .headline {
          opacity: 0.32;
          transform: translateY(-10px) scale(0.94);
        }

        .map-stage::after {
          height: 230px;
          background: linear-gradient(180deg, rgba(247, 248, 233, 0.92), rgba(247, 248, 233, 0.54) 54%, rgba(247, 248, 233, 0));
        }

        .city-strip {
          top: 258px;
          right: auto;
          bottom: auto;
          left: 34px;
          flex-direction: column;
          width: 268px;
          max-height: calc(100svh - 360px);
          overflow-x: hidden;
          overflow-y: auto;
          padding: 0 4px 4px 0;
          scroll-snap-type: y mandatory;
        }

        .city-button {
          width: 252px;
          min-width: 0;
          min-height: 62px;
          grid-template-columns: 38px minmax(0, 1fr);
          background: rgba(253, 254, 246, 0.78);
        }

        .map-legend {
          right: auto;
          bottom: 34px;
          left: 34px;
        }

        .soft-cover {
          background: linear-gradient(90deg, rgba(31, 39, 24, 0.04), rgba(31, 39, 24, 0.2));
        }

        .info-layer {
          inset: 32px 32px 32px auto;
          width: min(390px, calc(100vw - 72px));
          min-height: 0;
          overflow-y: auto;
          padding: 30px 24px 28px;
          border-radius: 24px;
          box-shadow: 0 22px 82px rgba(37, 45, 28, 0.28);
          transform: translateX(calc(100% + 48px));
        }

        .info-layer.is-open {
          transform: translateX(0);
        }

        .info-layer::before {
          top: 18px;
          left: 24px;
          width: 48px;
          height: 4px;
          transform: none;
        }

        .info-top {
          grid-template-columns: 78px minmax(0, 1fr) 38px;
        }

        .info-icon-spacer {
          width: 78px;
          height: 78px;
        }

        .info-title {
          font-size: 3rem;
        }

        .info-title.is-long {
          font-size: 2.42rem;
        }

        .info-body p {
          font-size: 1.04rem;
        }
      }

      @media (min-width: 1120px) {
        .phone {
          max-width: none;
        }

        .map-header {
          right: 42px;
          left: 42px;
        }

        .city-strip {
          top: 258px;
          left: 42px;
          width: 296px;
        }

        .city-button {
          width: 278px;
        }

        .map-legend {
          left: 42px;
        }

        .info-layer {
          right: 42px;
          width: 430px;
        }
      }

      @media (max-height: 720px) {
        .phone {
          min-height: 630px;
        }

        .map-header {
          top: max(12px, env(safe-area-inset-top));
        }

        h1 {
          font-size: 2.6rem;
        }

        .map-legend {
          display: none;
        }

        .info-layer {
          min-height: 60svh;
        }

        .info-facts {
          grid-template-columns: 1fr;
        }
      }

      @media (min-width: 760px) and (max-height: 720px) {
        .phone {
          min-height: 620px;
        }

        h1 {
          font-size: 3.9rem;
        }

        .city-strip {
          top: 188px;
          max-height: calc(100svh - 266px);
        }

        .info-layer {
          inset: 20px 20px 20px auto;
        }

        .info-facts {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Interaktive Ruhrgebiet-Karte">
      <header class="map-header">
        <div class="headline">
          <p class="eyebrow">Regionalkarte NRW</p>
          <h1>Ruhrgebiet in 3D</h1>
        </div>
        <div class="step-pill" aria-live="polite">
          <span id="stepCount">01 / 10</span>
        </div>
      </header>

      <section class="map-stage" aria-label="Ruhrgebiet mit Standorten">
        <svg class="map-world" viewBox="0 0 1600 980" role="img" aria-label="Stilisierte 3D-Regionalkarte des Ruhrgebiets">
          <defs>
            <filter id="topLight">
              <feDropShadow dx="-2" dy="-3" stdDeviation="2" flood-color="#ffffff" flood-opacity=".56" />
              <feDropShadow dx="3" dy="5" stdDeviation="3" flood-color="#45503d" flood-opacity=".18" />
            </filter>
            <filter id="paper-noise">
              <feTurbulence baseFrequency=".75" numOctaves="2" seed="17" type="fractalNoise" />
              <feColorMatrix type="saturate" values="0" />
              <feComponentTransfer>
                <feFuncA type="table" tableValues="0 .12" />
              </feComponentTransfer>
            </filter>
            <g id="icon-leaf">
              <path d="M-6 28h12V8c20-2 32-17 34-40C14-33-3-22-7-7c-9-14-27-18-42-6 8 18 24 25 43 22Z" />
            </g>
            <g id="icon-people">
              <circle cx="-20" cy="-12" r="11" />
              <circle cx="20" cy="-12" r="11" />
              <circle cx="0" cy="-20" r="12" />
              <path d="M-38 28c3-19 14-29 29-29 8 0 15 3 19 8 4-5 11-8 19-8 15 0 26 10 29 29Z" />
            </g>

        const scale = web ? (phone.clientWidth >= 1120 ? 0.9 : 0.78) : compact ? 1.52 : 1.38;
        const centerX = web
          ? leftRail + (phone.clientWidth - leftRail - panelWidth) / 2
          : phone.clientWidth / 2;
        const centerY = web ? phone.clientHeight * 0.53 : openId ? phone.clientHeight * 0.35 : phone.clientHeight * 0.46;
        const x = centerX - location.map.x * scale;
        const y = centerY - location.map.y * scale;

        world.style.setProperty("--map-scale", scale);
        world.style.setProperty("--map-x", `${x}px`);
        world.style.setProperty("--map-y", `${y}px`);
      }

      function routeBetween(from, to) {
        const midX = (from.map.x + to.map.x) / 2;
        const midY = Math.min(from.map.y, to.map.y) - Math.max(55, Math.abs(to.map.x - from.map.x) * 0.1);
        return `M${from.map.x} ${from.map.y} Q${midX} ${midY} ${to.map.x} ${to.map.y}`;
      }

      function animateRoute(from, to) {
        const path = routeBetween(from, to);
        activeRoute.setAttribute("d", path);
        activeRoute.style.strokeDasharray = "none";
        activeRoute.style.strokeDashoffset = "0";

        const length = activeRoute.getTotalLength();
        activeRoute.style.strokeDasharray = length;
        activeRoute.style.strokeDashoffset = length;
        activeRoute.animate(
          [
            { strokeDashoffset: length },
            { strokeDashoffset: 0 }
          ],
          {
            duration: 720,
            easing: "cubic-bezier(.18,.92,.2,1)",
            fill: "forwards"
          }
        );

        routeDot.setAttribute("cx", to.map.x);
        routeDot.setAttribute("cy", to.map.y);
        routeDot.animate(
          [
            { opacity: 0, transform: "scale(.6)" },
            { opacity: 1, transform: "scale(1.2)", offset: 0.65 },
            { opacity: 0, transform: "scale(.2)" }
          ],
          {
            duration: 820,
            easing: "ease-out"
          }
        );
      }

      function setActive(index, options = {}) {
        previousIndex = activeIndex;
        activeIndex = (index + locations.length) % locations.length;
        const item = locations[activeIndex];

        document.querySelectorAll(".map-marker").forEach((marker) => {
          const isCurrent = marker.dataset.location === item.id;
          marker.setAttribute("aria-current", String(isCurrent));
        });

        document.querySelectorAll(".region-top").forEach((region) => {
          region.classList.toggle("is-active", region.dataset.region === item.id);
        });

        [...strip.querySelectorAll(".city-button")].forEach((button, buttonIndex) => {
          button.classList.toggle("is-active", buttonIndex === activeIndex);
          if (buttonIndex === activeIndex && !options.skipScroll) {
            button.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
          }
        });

        stepCount.textContent = `${String(activeIndex + 1).padStart(2, "0")} / ${String(locations.length).padStart(2, "0")}`;
        centerOnLocation(item);

        if (!options.skipRoute && previousIndex !== activeIndex) {
          animateRoute(locations[previousIndex], item);
        }

        if (openId) {
          updateInfo(item);
        }
      }

      function updateInfo(item) {
        infoKicker.textContent = `${item.continent} · ${item.label}`;
        infoTitle.textContent = item.city;
        infoTitle.classList.toggle("is-long", item.city.length > 10);
        infoText.textContent = item.text;
        infoFocus.textContent = item.focus;
        infoRegion.textContent = item.region;
      }

      function markerCenterOnScreen(item) {
        const worldRect = world.getBoundingClientRect();
        const svgBounds = world.viewBox.baseVal;
        const sx = worldRect.width / svgBounds.width;
        const sy = worldRect.height / svgBounds.height;

        return {
          x: worldRect.left + item.map.x * sx,
          y: worldRect.top + item.map.y * sy
        };
      }

      function openInfo(item) {
        updateInfo(item);
        openId = item.id;
        phone.classList.add("is-layer-open");
        centerOnLocation(item);

        const start = markerCenterOnScreen(item);
        const shell = phone.getBoundingClientRect();
        const panelStyle = getComputedStyle(infoLayer);
        const panelRight = parseFloat(panelStyle.right || 0);
        const panelTop = parseFloat(panelStyle.top || 0);
        const panelWidth = infoLayer.offsetWidth;
        const panelHeight = infoLayer.offsetHeight;
        const target = isWebLayout()
          ? {
              x: shell.right - panelRight - panelWidth + 62,
              y: shell.top + panelTop + 66
            }
          : {
              x: shell.left + 57,
              y: shell.bottom - panelHeight + 60
            };

        const floatSize = Math.round(58 + item.ring * 0.42);
        floatingIcon.style.setProperty("--float-size", `${floatSize}px`);
        floatingIcon.innerHTML = iconSvg(item.icon);
        floatingIcon.classList.add("is-visible");
        floatingIcon.style.left = `${start.x - shell.left}px`;
        floatingIcon.style.top = `${start.y - shell.top}px`;

        const dx = target.x - start.x;
        const dy = target.y - start.y;

        floatingIcon.animate(
          [
            { transform: "translate(-50%, -50%) scale(.82) rotate(-5deg)", opacity: 0 },
            { transform: "translate(-50%, -50%) scale(1.08) rotate(2deg)", opacity: 1, offset: 0.22 },
            { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1) rotate(0deg)`, opacity: 1 }
          ],
          {
            duration: 720,
            easing: "cubic-bezier(.18,.92,.2,1)",
            fill: "forwards"
          }
        );

        softCover.hidden = false;
        requestAnimationFrame(() => {
          softCover.classList.add("is-open");
          infoLayer.classList.add("is-open");
        });
      }

      function closeLayer() {
        openId = null;
        phone.classList.remove("is-layer-open");
        infoLayer.classList.remove("is-open");
        softCover.classList.remove("is-open");
        floatingIcon.classList.remove("is-visible");
        centerOnLocation(locations[activeIndex]);
        window.setTimeout(() => {
          if (!openId) {
            softCover.hidden = true;
            floatingIcon.innerHTML = "";
          }
        }, 430);
      }

      function selectById(id, open = false) {
        const index = locations.findIndex((item) => item.id === id);
        if (index === -1) return;
        const wasActive = index === activeIndex;
        setActive(index);
        if (open) {
          window.setTimeout(() => openInfo(locations[activeIndex]), wasActive ? 90 : 820);
        }
      }

      renderRegions();
      renderMarkers();
      renderButtons();

      strip.addEventListener("click", (event) => {
        const button = event.target.closest(".city-button");
        if (!button) return;
        closeLayer();
        setActive(Number(button.dataset.index));
      });

      markersLayer.addEventListener("click", (event) => {
        const marker = event.target.closest(".map-marker");
        if (!marker) return;
        selectById(marker.dataset.location, true);
      });

      markersLayer.addEventListener("keydown", (event) => {
        const marker = event.target.closest(".map-marker");
        if (!marker || (event.key !== "Enter" && event.key !== " ")) return;
        event.preventDefault();
        selectById(marker.dataset.location, true);
      });

      closeInfo.addEventListener("click", closeLayer);
      softCover.addEventListener("click", closeLayer);

      let startX = 0;
      let startY = 0;

      document.querySelector(".map-stage").addEventListener("pointerdown", (event) => {
        startX = event.clientX;
        startY = event.clientY;
      });

      document.querySelector(".map-stage").addEventListener("pointerup", (event) => {
        const dx = event.clientX - startX;
        const dy = event.clientY - startY;
        if (Math.abs(dx) > 52 && Math.abs(dx) > Math.abs(dy) * 1.28) {
          closeLayer();
          setActive(activeIndex + (dx < 0 ? 1 : -1));
        }
      });

      window.addEventListener("resize", () => centerOnLocation(locations[activeIndex]));
      setActive(0, { skipScroll: true, skipRoute: true });
    </script>
  </body>
</html>
