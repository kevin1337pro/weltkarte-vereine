<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Weltkarte Vereine</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f5f0e4;
        --paper-deep: #e4d6b7;
        --ink: #18140f;
        --muted: #665c4d;
        --land: #d29a16;
        --land-soft: #e4b23a;
        --land-dark: #b47d0b;
        --water: #fbf7ed;
        --rule: rgba(24, 20, 15, 0.15);
        --shadow: rgba(45, 31, 9, 0.28);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #d9cfbd;
      }

      body {
        display: grid;
        place-items: center;
        color: var(--ink);
      }

      button {
        font: inherit;
      }

      .phone {
        position: relative;
        width: min(100vw, 430px);
        height: 100svh;
        min-height: 690px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0) 25%),
          var(--paper);
        isolation: isolate;
      }

      .phone::before {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(24, 20, 15, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(24, 20, 15, 0.08) 1px, transparent 1px);
        background-size: 27px 27px;
        mask-image: linear-gradient(180deg, transparent, #000 11%, #000 88%, transparent);
      }

      .map-header {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        right: 18px;
        left: 18px;
        z-index: 8;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        pointer-events: none;
      }

      .headline {
        max-width: 245px;
        transform-origin: left top;
        transition:
          opacity 360ms ease,
          transform 360ms ease;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: #84620e;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #11100c;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 3.25rem;
        font-style: italic;
        font-weight: 900;
        line-height: 0.84;
      }

      .step-pill {
        display: grid;
        min-width: 72px;
        min-height: 38px;
        padding: 0 11px;
        place-items: center;
        border: 1px solid rgba(24, 20, 15, 0.14);
        border-radius: 999px;
        background: rgba(250, 247, 238, 0.78);
        box-shadow: 0 12px 34px rgba(43, 31, 13, 0.1);
        color: #4f4228;
        font-size: 0.76rem;
        font-weight: 900;
        pointer-events: auto;
        backdrop-filter: blur(12px);
        transition:
          opacity 360ms ease,
          transform 360ms ease;
      }

      .phone.is-layer-open .headline {
        opacity: 0.28;
        transform: translateY(-8px) scale(0.9);
      }

      .phone.is-layer-open .step-pill {
        opacity: 0.72;
        transform: translateY(-5px);
      }

      .map-stage {
        position: absolute;
        inset: 0;
        z-index: 1;
        overflow: hidden;
        touch-action: pan-y;
        background:
          radial-gradient(circle at 52% 43%, rgba(226, 176, 48, 0.19), transparent 33%),
          radial-gradient(circle at 24% 62%, rgba(151, 190, 180, 0.18), transparent 35%),
          var(--water);
      }

      .map-stage::after {
        position: absolute;
        inset: 0 0 auto;
        height: 190px;
        pointer-events: none;
        content: "";
        background: linear-gradient(180deg, rgba(251, 247, 237, 0.96), rgba(251, 247, 237, 0.78) 48%, rgba(251, 247, 237, 0));
      }

      .map-world {
        --map-x: -520px;
        --map-y: -240px;
        --map-scale: 1.4;
        position: absolute;
        top: 0;
        left: 0;
        width: 1480px;
        height: 920px;
        transform:
          translate3d(var(--map-x), var(--map-y), 0)
          scale(var(--map-scale));
        transform-origin: 0 0;
        transition: transform 820ms cubic-bezier(0.18, 0.92, 0.2, 1);
        will-change: transform;
      }

      .graticule {
        fill: none;
        stroke: rgba(24, 20, 15, 0.1);
        stroke-width: 1;
        stroke-dasharray: 8 12;
      }

      .continent,
      .island {
        fill: var(--land);
        stroke: rgba(101, 67, 7, 0.24);
        stroke-linejoin: round;
        stroke-width: 2.4;
      }

      .continent.alt,
      .island.alt {
        fill: var(--land-soft);
      }

      .coast-detail {
        fill: none;
        stroke: rgba(118, 78, 9, 0.28);
        stroke-linecap: round;
        stroke-width: 2.2;
      }

      .terrain {
        fill: none;
        stroke: rgba(55, 38, 15, 0.2);
        stroke-linecap: round;
        stroke-width: 3;
      }

      .watermark-label {
        fill: rgba(24, 20, 15, 0.13);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 112px;
        font-style: italic;
        font-weight: 900;
        letter-spacing: 0;
        pointer-events: none;
      }

      .continent-label {
        fill: #17130d;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 36px;
        font-style: italic;
        font-weight: 900;
        letter-spacing: 0;
        paint-order: stroke;
        stroke: rgba(245, 240, 228, 0.78);
        stroke-width: 5px;
      }

      .project-note {
        fill: #443a2d;
        font-size: 12px;
        font-weight: 760;
        opacity: 0.74;
      }

      .route-line {
        fill: none;
        stroke: rgba(24, 20, 15, 0.22);
        stroke-dasharray: 10 13;
        stroke-linecap: round;
        stroke-width: 2.2;
      }

      .active-route {
        fill: none;
        stroke: rgba(21, 17, 13, 0.74);
        stroke-linecap: round;
        stroke-width: 4.5;
        filter: drop-shadow(0 5px 8px rgba(72, 44, 4, 0.18));
      }

      .route-dot {
        fill: #15110c;
        opacity: 0;
      }

      .map-marker {
        cursor: pointer;
        outline: none;
        transform-box: fill-box;
        transform-origin: center;
      }

      .map-marker .tap-ring {
        fill: rgba(251, 247, 237, 0.72);
        stroke: rgba(24, 20, 15, 0.2);
        stroke-width: 2.3;
        transition:
          fill 220ms ease,
          stroke 220ms ease,
          stroke-width 220ms ease;
      }

      .map-marker .halo {
        fill: rgba(255, 246, 217, 0.28);
        stroke: rgba(255, 246, 217, 0.52);
        stroke-width: 2;
        opacity: 0.82;
      }

      .map-marker .marker-icon {
        fill: #15110c;
        transition: transform 260ms ease;
      }

      .map-marker text {
        fill: #17130d;
        font-size: 15px;
        font-weight: 900;
        paint-order: stroke;
        stroke: rgba(245, 240, 228, 0.9);
        stroke-width: 4.4px;
      }

      .map-marker .marker-meta {
        fill: rgba(24, 20, 15, 0.68);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .map-marker[aria-current="true"] .tap-ring {
        fill: #fff8e5;
        stroke: rgba(24, 20, 15, 0.46);
        stroke-width: 3;
      }

      .map-marker[aria-current="true"] .marker-icon {
        transform: scale(1.08);
      }

      .map-marker[aria-current="true"] .halo {
        animation: pulse 1.7s ease-out infinite;
      }

      .map-marker:focus-visible .tap-ring {
        stroke: #111;
        stroke-width: 4.5;
      }

      @keyframes pulse {
        0% {
          opacity: 0.75;
          transform: scale(0.9);
        }

        100% {
          opacity: 0;
          transform: scale(1.24);
        }
      }

      .floating-icon {
        position: absolute;
        z-index: 11;
        display: grid;
        width: var(--float-size, 70px);
        height: var(--float-size, 70px);
        place-items: center;
        border: 1px solid rgba(24, 20, 15, 0.17);
        border-radius: 22px;
        background:
          radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.9), transparent 42%),
          #fff7e4;
        box-shadow: 0 18px 58px rgba(43, 31, 13, 0.28);
        color: #14110d;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.92);
      }

      .floating-icon svg {
        width: calc(var(--float-size, 70px) * 0.63);
        height: calc(var(--float-size, 70px) * 0.63);
        fill: currentColor;
      }

      .floating-icon.is-visible {
        opacity: 1;
      }

      .city-strip {
        position: absolute;
        right: 0;
        bottom: max(18px, env(safe-area-inset-bottom));
        left: 0;
        z-index: 7;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 0 18px 2px;
        scrollbar-width: none;
        scroll-snap-type: x mandatory;
      }

      .city-strip::-webkit-scrollbar {
        display: none;
      }

      .city-button {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        align-items: center;
        min-width: 160px;
        min-height: 58px;
        padding: 9px 12px 9px 10px;
        border: 1px solid rgba(24, 20, 15, 0.13);
        border-radius: 8px;
        background: rgba(255, 250, 236, 0.9);
        box-shadow: 0 12px 36px rgba(43, 31, 13, 0.12);
        color: var(--ink);
        cursor: pointer;
        scroll-snap-align: center;
        backdrop-filter: blur(13px);
      }

      .city-button svg {
        width: var(--button-icon, 25px);
        height: var(--button-icon, 25px);
        fill: currentColor;
      }

      .city-button span {
        min-width: 0;
        overflow: hidden;
        font-size: 0.83rem;
        font-weight: 900;
        line-height: 1.05;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .city-button small {
        display: block;
        margin-top: 2px;
        overflow: hidden;
        color: var(--muted);
        font-size: 0.66rem;
        font-weight: 760;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .city-button.is-active {
        border-color: rgba(24, 20, 15, 0.34);
        background: #15120e;
        color: #fff5dc;
      }

      .city-button.is-active small {
        color: rgba(255, 245, 220, 0.72);
      }

      .map-legend {
        position: absolute;
        right: 18px;
        bottom: calc(max(18px, env(safe-area-inset-bottom)) + 74px);
        z-index: 6;
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 8px 10px;
        border: 1px solid rgba(24, 20, 15, 0.12);
        border-radius: 8px;
        background: rgba(255, 250, 236, 0.75);
        color: rgba(24, 20, 15, 0.7);
        font-size: 0.68rem;
        font-weight: 900;
        backdrop-filter: blur(10px);
      }

      .map-legend span {
        width: 26px;
        height: 2px;
        border-radius: 99px;
        background: repeating-linear-gradient(90deg, #15110c 0 7px, transparent 7px 12px);
      }

      .soft-cover {
        position: absolute;
        inset: 0;
        z-index: 9;
        background: rgba(40, 29, 12, 0.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity 420ms ease;
      }

      .soft-cover.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .info-layer {
        position: absolute;
        inset: auto 0 0;
        z-index: 10;
        min-height: min(58svh, 462px);
        padding: 26px 20px max(28px, env(safe-area-inset-bottom));
        border-radius: 28px 28px 0 0;
        background:
          radial-gradient(circle at 16% 8%, rgba(226, 178, 58, 0.18), transparent 34%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0) 46%),
          #fff7e5;
        box-shadow: 0 -24px 86px rgba(43, 31, 13, 0.34);
        transform: translateY(105%);
        transition: transform 640ms cubic-bezier(0.18, 0.92, 0.2, 1);
        will-change: transform;
      }

      .info-layer.is-open {
        transform: translateY(0);
      }

      .info-layer::before {
        position: absolute;
        top: 10px;
        left: 50%;
        width: 46px;
        height: 4px;
        border-radius: 999px;
        background: rgba(24, 20, 15, 0.2);
        content: "";
        transform: translateX(-50%);
      }

      .info-top {
        display: grid;
        grid-template-columns: 74px minmax(0, 1fr) 38px;
        gap: 14px;
        align-items: start;
      }

      .info-icon-spacer {
        width: 74px;
        height: 74px;
      }

      .info-kicker {
        margin: 6px 0 5px;
        color: #85620f;
        font-size: 0.72rem;
        font-weight: 950;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .info-title {
        margin: 0;
        overflow-wrap: anywhere;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 2.6rem;
        font-style: italic;
        font-weight: 900;
        line-height: 0.92;
      }

      .close-button {
        display: grid;
        width: 38px;
        height: 38px;
        padding: 0;
        place-items: center;
        border: 1px solid rgba(24, 20, 15, 0.14);
        border-radius: 50%;
        background: #f1e5cb;
        color: var(--ink);
        cursor: pointer;
      }

      .close-button svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-width: 2.4;
      }

      .info-body {
        margin: 22px 0 0;
      }

      .info-body p {
        margin: 0;
        color: #453d33;
        font-size: 1rem;
        font-weight: 720;
        line-height: 1.52;
      }

      .info-facts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 21px 0 0;
      }

      .fact {
        min-height: 82px;
        padding: 12px;
        border: 1px solid rgba(24, 20, 15, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.42);
      }

      .fact strong {
        display: block;
        margin-bottom: 6px;
        font-size: 0.72rem;
        font-weight: 950;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }

      .fact span {
        color: #504638;
        font-size: 0.87rem;
        font-weight: 780;
        line-height: 1.28;
      }

      .detail-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        margin-top: 22px;
        padding: 0 14px;
        border: 0;
        border-radius: 8px;
        background: #191510;
        color: #fff6e1;
        cursor: pointer;
        font-weight: 950;
        text-decoration: none;
        appearance: none;
      }

      .detail-link svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.5;
      }

      @media (min-width: 431px) {
        .phone {
          height: min(100svh, 860px);
          box-shadow: 0 24px 80px rgba(50, 41, 25, 0.28);
        }
      }

      @media (min-width: 760px) {
        body {
          padding: 0;
        }

        .phone {
          width: 100vw;
          max-width: 1440px;
          height: 100svh;
          min-height: 760px;
          box-shadow: none;
        }

        .map-header {
          top: 32px;
          right: 34px;
          left: 34px;
          align-items: flex-start;
        }

        .headline {
          max-width: 620px;
        }

        .eyebrow {
          font-size: 0.78rem;
        }

        h1 {
          font-size: 4.75rem;
        }

        .phone.is-layer-open .headline {
          opacity: 0.34;
          transform: translateY(-10px) scale(0.94);
        }

        .map-stage::after {
          height: 230px;
          background: linear-gradient(180deg, rgba(251, 247, 237, 0.92), rgba(251, 247, 237, 0.54) 54%, rgba(251, 247, 237, 0));
        }

        .city-strip {
          top: 260px;
          right: auto;
          bottom: auto;
          left: 34px;
          flex-direction: column;
          width: 268px;
          max-height: calc(100svh - 362px);
          overflow-x: hidden;
          overflow-y: auto;
          padding: 0 4px 4px 0;
          scroll-snap-type: y mandatory;
        }

        .city-button {
          width: 252px;
          min-width: 0;
          min-height: 62px;
          grid-template-columns: 38px minmax(0, 1fr);
          background: rgba(255, 250, 236, 0.78);
        }

        .map-legend {
          right: auto;
          bottom: 34px;
          left: 34px;
        }

        .soft-cover {
          background: linear-gradient(90deg, rgba(40, 29, 12, 0.04), rgba(40, 29, 12, 0.2));
        }

        .info-layer {
          inset: 32px 32px 32px auto;
          width: min(390px, calc(100vw - 72px));
          min-height: 0;
          overflow-y: auto;
          padding: 30px 24px 28px;
          border-radius: 24px;
          box-shadow: 0 22px 82px rgba(43, 31, 13, 0.28);
          transform: translateX(calc(100% + 48px));
        }

        .info-layer.is-open {
          transform: translateX(0);
        }

        .info-layer::before {
          top: 18px;
          left: 24px;
          width: 48px;
          height: 4px;
          transform: none;
        }

        .info-top {
          grid-template-columns: 78px minmax(0, 1fr) 38px;
        }

        .info-icon-spacer {
          width: 78px;
          height: 78px;
        }

        .info-title {
          font-size: 3rem;
        }

        .info-body p {
          font-size: 1.04rem;
        }
      }

      @media (min-width: 1120px) {
        .phone {
          max-width: none;
        }

        .map-header {
          right: 42px;
          left: 42px;
        }

        .city-strip {
          left: 42px;
          width: 296px;
          top: 258px;
        }

        .city-button {
          width: 278px;
        }

        .map-legend {
          left: 42px;
        }

        .info-layer {
          right: 42px;
          width: 430px;
        }
      }

      @media (max-height: 720px) {
        .phone {
          min-height: 630px;
        }

        .map-header {
          top: max(12px, env(safe-area-inset-top));
        }

        h1 {
          font-size: 2.75rem;
        }

        .map-legend {
          display: none;
        }

        .info-layer {
          min-height: 60svh;
        }

        .info-facts {
          grid-template-columns: 1fr;
        }
      }

      @media (min-width: 760px) and (max-height: 720px) {
        .phone {
          min-height: 620px;
        }

        h1 {
          font-size: 4rem;
        }

        .city-strip {
          top: 190px;
          max-height: calc(100svh - 268px);
        }

        .info-layer {
          inset: 20px 20px 20px auto;
        }

        .info-facts {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Interaktive Weltkarte">
      <header class="map-header">
        <div class="headline">
          <p class="eyebrow">Vereine weltweit</p>
          <h1>Weltweit für Zukunft</h1>
        </div>
        <div class="step-pill" aria-live="polite">
          <span id="stepCount">01 / 09</span>
        </div>
      </header>

      <section class="map-stage" aria-label="Karte mit Standorten">
        <svg class="map-world" viewBox="0 0 1480 920" role="img" aria-label="Detaillierte stilisierte Weltkarte">
          <defs>
            <g id="icon-education">
              <path d="M0-24 31-10 0 4-31-10Z" />
              <path d="M-19-4v18c9 8 29 8 38 0V-4L0 5Z" />
              <path d="M26-8v20" stroke="currentColor" stroke-width="5" stroke-linecap="round" />
              <circle cx="26" cy="17" r="4" />
            </g>
            <g id="icon-water">
              <path d="M-21 10c9-26 26-40 26-40s17 14 26 40c4 15-7 29-26 29S-25 25-21 10Z" />
              <path d="M-8 12c3 7 9 11 18 11" fill="none" stroke="#fff6e1" stroke-width="5" stroke-linecap="round" opacity=".68" />
            </g>
            <g id="icon-health">
              <path d="M-23-6h16v-16H7v16h16V8H7v16H-7V8h-16Z" />
            </g>
            <g id="icon-home">
              <path d="M-30-1 0-27 30-1h-8v30h-17V9h-10v20h-17V-1Z" />
            </g>
            <g id="icon-nature">
              <path d="M-5 28h10V6c16-2 27-13 30-34C12-30-2-22-5-7c-6-15-21-21-38-12C-34-1-20 8-5 7Z" />
            </g>
            <g id="icon-community">
              <circle cx="-18" cy="-12" r="11" />
              <circle cx="18" cy="-12" r="11" />
              <circle cx="0" cy="-20" r="12" />
              <path d="M-36 27c2-19 13-29 27-29 8 0 14 3 18 8 4-5 10-8 18-8 14 0 25 10 27 29Z" />
            </g>
            <g id="icon-food">
              <path d="M-24-30h7v27h-7Zm13 0h7v27h-7ZM2-30h7v27H2Z" />
              <path d="M-24-4H9c0 16-7 25-17 28v16h-8V24C-27 21-34 12-34-4Z" />
              <path d="M24-31c12 9 16 24 11 38-2 6-5 11-11 15v18h-8v-72Z" />

    <script>
      const locations = [

      const svgNS = "http://www.w3.org/2000/svg";
      const phone = document.querySelector(".phone");
      const world = document.querySelector(".map-world");
      const markersLayer = document.querySelector("#markersLayer");
      const strip = document.querySelector(".city-strip");
      const stepCount = document.querySelector("#stepCount");
      const activeRoute = document.querySelector("#activeRoute");
      const routeDot = document.querySelector("#routeDot");
      const infoLayer = document.querySelector("#infoLayer");
      const softCover = document.querySelector("#softCover");
      const closeInfo = document.querySelector("#closeInfo");
      const floatingIcon = document.querySelector("#floatingIcon");
      const infoKicker = document.querySelector("#infoKicker");
      const infoTitle = document.querySelector("#infoTitle");
      const infoText = document.querySelector("#infoText");
      const infoFocus = document.querySelector("#infoFocus");
      const infoRegion = document.querySelector("#infoRegion");

      let activeIndex = 0;
      let previousIndex = 0;
      let openId = null;

      function iconSvg(iconId) {
        return `<svg viewBox="-46 -46 92 92" aria-hidden="true"><use href="#${iconId}"></use></svg>`;
      }

      function isWebLayout() {
        return window.matchMedia("(min-width: 760px)").matches;
      }

      function createSvgElement(tag, attrs = {}) {
        const node = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
        return node;
      }

      function renderMarkers() {
        markersLayer.innerHTML = "";

        locations.forEach((item) => {
          const marker = createSvgElement("g", {
            class: "map-marker",
            "data-location": item.id,
            tabindex: "0",
            role: "button",
            "aria-label": `${item.city} auswählen`,
            transform: `translate(${item.map.x} ${item.map.y})`
          });

          const halo = createSvgElement("circle", { class: "halo", r: item.ring + 14 });
          const ring = createSvgElement("circle", { class: "tap-ring", r: item.ring });
          const iconWrap = createSvgElement("g", {
            class: "marker-icon",
            transform: `scale(${item.iconSize})`
          });
          const use = createSvgElement("use", { href: `#${item.icon}` });
          const text = createSvgElement("text", {
            x: "0",
            y: item.ring + 21,
            "text-anchor": "middle"
          });
          const meta = createSvgElement("text", {
            class: "marker-meta",
            x: "0",
            y: item.ring + 37,
            "text-anchor": "middle"
          });

          text.textContent = item.city;
          meta.textContent = item.priority;
          iconWrap.append(use);
          marker.append(halo, ring, iconWrap, text, meta);
          markersLayer.append(marker);
        });
      }

      function renderButtons() {
        strip.innerHTML = locations
          .map((item, index) => {
            const buttonIcon = Math.round(23 + item.iconSize * 5);
            return `
              <button class="city-button" type="button" data-index="${index}" style="--button-icon: ${buttonIcon}px">
                ${iconSvg(item.icon)}
                <span>${item.city}<small>${item.label}</small></span>
              </button>`;
          })
          .join("");
      }

      function centerOnLocation(location) {
        const compact = phone.clientWidth < 380;
        const web = isWebLayout();
        const panelWidth = openId && web ? infoLayer.offsetWidth + parseFloat(getComputedStyle(infoLayer).right || 0) : 0;
        const leftRail = web ? Math.min(320, phone.clientWidth * 0.26) : 0;
        const scale = web ? (phone.clientWidth >= 1120 ? 1.03 : 0.9) : compact ? 1.73 : 1.62;
        const centerX = web
          ? leftRail + (phone.clientWidth - leftRail - panelWidth) / 2
          : phone.clientWidth / 2;
        const centerY = web ? phone.clientHeight * 0.53 : openId ? phone.clientHeight * 0.34 : phone.clientHeight * 0.45;
        const x = centerX - location.map.x * scale;
        const y = centerY - location.map.y * scale;

        world.style.setProperty("--map-scale", scale);
        world.style.setProperty("--map-x", `${x}px`);
        world.style.setProperty("--map-y", `${y}px`);
      }

      function routeBetween(from, to) {
        const midX = (from.map.x + to.map.x) / 2;
        const midY = Math.min(from.map.y, to.map.y) - Math.max(70, Math.abs(to.map.x - from.map.x) * 0.13);
        return `M${from.map.x} ${from.map.y} Q${midX} ${midY} ${to.map.x} ${to.map.y}`;
      }

      function animateRoute(from, to) {
        const path = routeBetween(from, to);
        activeRoute.setAttribute("d", path);
        activeRoute.style.strokeDasharray = "none";
        activeRoute.style.strokeDashoffset = "0";

        const length = activeRoute.getTotalLength();
        activeRoute.style.strokeDasharray = length;
        activeRoute.style.strokeDashoffset = length;
        activeRoute.animate(
          [
            { strokeDashoffset: length },
            { strokeDashoffset: 0 }
          ],
          {
            duration: 720,
            easing: "cubic-bezier(.18,.92,.2,1)",
            fill: "forwards"
          }
        );

        routeDot.setAttribute("cx", to.map.x);
        routeDot.setAttribute("cy", to.map.y);
        routeDot.animate(
          [
            { opacity: 0, transform: "scale(.6)" },
            { opacity: 1, transform: "scale(1.2)", offset: 0.65 },
            { opacity: 0, transform: "scale(.2)" }
          ],
          {
            duration: 820,
            easing: "ease-out"
          }
        );
      }

      function setActive(index, options = {}) {
        previousIndex = activeIndex;
        activeIndex = (index + locations.length) % locations.length;
        const item = locations[activeIndex];

        document.querySelectorAll(".map-marker").forEach((marker) => {
          const isCurrent = marker.dataset.location === item.id;
          marker.setAttribute("aria-current", String(isCurrent));
        });

        [...strip.querySelectorAll(".city-button")].forEach((button, buttonIndex) => {
          button.classList.toggle("is-active", buttonIndex === activeIndex);
          if (buttonIndex === activeIndex && !options.skipScroll) {
            button.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
          }
        });

        stepCount.textContent = `${String(activeIndex + 1).padStart(2, "0")} / ${String(locations.length).padStart(2, "0")}`;
        centerOnLocation(item);

        if (!options.skipRoute && previousIndex !== activeIndex) {
          animateRoute(locations[previousIndex], item);
        }

        if (openId) {
          updateInfo(item);
        }
      }

      function updateInfo(item) {
        infoKicker.textContent = `${item.continent} · ${item.label}`;
        infoTitle.textContent = item.city;
        infoText.textContent = item.text;
        infoFocus.textContent = item.focus;
        infoRegion.textContent = item.region;
      }

      function markerCenterOnScreen(item) {
        const worldRect = world.getBoundingClientRect();
        const svgBounds = world.viewBox.baseVal;
        const sx = worldRect.width / svgBounds.width;
        const sy = worldRect.height / svgBounds.height;

        return {
          x: worldRect.left + item.map.x * sx,
          y: worldRect.top + item.map.y * sy
        };
      }

      function openInfo(item) {
        updateInfo(item);
        openId = item.id;
        phone.classList.add("is-layer-open");
        centerOnLocation(item);

        const start = markerCenterOnScreen(item);
        const shell = phone.getBoundingClientRect();
        const panelStyle = getComputedStyle(infoLayer);
        const panelRight = parseFloat(panelStyle.right || 0);
        const panelTop = parseFloat(panelStyle.top || 0);
        const panelWidth = infoLayer.offsetWidth;
        const panelHeight = infoLayer.offsetHeight;
        const target = isWebLayout()
          ? {
              x: shell.right - panelRight - panelWidth + 62,
              y: shell.top + panelTop + 66
            }
          : {
              x: shell.left + 57,
              y: shell.bottom - panelHeight + 60
            };

        const floatSize = Math.round(58 + item.ring * 0.42);
        floatingIcon.style.setProperty("--float-size", `${floatSize}px`);
        floatingIcon.innerHTML = iconSvg(item.icon);
        floatingIcon.classList.add("is-visible");
        floatingIcon.style.left = `${start.x - shell.left}px`;
        floatingIcon.style.top = `${start.y - shell.top}px`;

        const dx = target.x - start.x;
        const dy = target.y - start.y;

        floatingIcon.animate(
          [
            { transform: "translate(-50%, -50%) scale(.82) rotate(-5deg)", opacity: 0 },
            { transform: "translate(-50%, -50%) scale(1.08) rotate(2deg)", opacity: 1, offset: 0.22 },
            { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1) rotate(0deg)`, opacity: 1 }
          ],
          {
            duration: 720,
            easing: "cubic-bezier(.18,.92,.2,1)",
            fill: "forwards"
          }
        );

        softCover.hidden = false;
        requestAnimationFrame(() => {
          softCover.classList.add("is-open");
          infoLayer.classList.add("is-open");
        });
      }

      function closeLayer() {
        openId = null;
        phone.classList.remove("is-layer-open");
        infoLayer.classList.remove("is-open");
        softCover.classList.remove("is-open");
        floatingIcon.classList.remove("is-visible");
        centerOnLocation(locations[activeIndex]);
        window.setTimeout(() => {
          if (!openId) {
            softCover.hidden = true;
            floatingIcon.innerHTML = "";
          }
        }, 430);
      }

      function selectById(id, open = false) {
        const index = locations.findIndex((item) => item.id === id);
        if (index === -1) return;
        const wasActive = index === activeIndex;
        setActive(index);
        if (open) {
          window.setTimeout(() => openInfo(locations[activeIndex]), wasActive ? 90 : 820);
        }
      }

      renderMarkers();
      renderButtons();

      strip.addEventListener("click", (event) => {
        const button = event.target.closest(".city-button");
        if (!button) return;
        closeLayer();
        setActive(Number(button.dataset.index));
      });

      markersLayer.addEventListener("click", (event) => {
        const marker = event.target.closest(".map-marker");
        if (!marker) return;
        selectById(marker.dataset.location, true);
      });

      markersLayer.addEventListener("keydown", (event) => {
        const marker = event.target.closest(".map-marker");
        if (!marker || (event.key !== "Enter" && event.key !== " ")) return;
        event.preventDefault();
        selectById(marker.dataset.location, true);
      });

      closeInfo.addEventListener("click", closeLayer);
      softCover.addEventListener("click", closeLayer);

      let startX = 0;
      let startY = 0;

      document.querySelector(".map-stage").addEventListener("pointerdown", (event) => {
        startX = event.clientX;
        startY = event.clientY;
      });

      document.querySelector(".map-stage").addEventListener("pointerup", (event) => {
        const dx = event.clientX - startX;
        const dy = event.clientY - startY;
        if (Math.abs(dx) > 52 && Math.abs(dx) > Math.abs(dy) * 1.28) {
          closeLayer();
          setActive(activeIndex + (dx < 0 ? 1 : -1));
        }
      });

      window.addEventListener("resize", () => centerOnLocation(locations[activeIndex]));
      setActive(0, { skipScroll: true, skipRoute: true });
    </script>
  </body>
</html>
